<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente em CSS</title>
    <style>
        * { /*Configurações globais das CSS */
            height: 100%;
        }
        body {
            background-image: linear-gradient(to bottom, #3198E2, #6D59C0, #893590, #E33F5F, #FDD579);
            /* to right(pra direita), to left(pra esquerda), to top(pra cima), to bottom(pra baixo) */
            background-attachment: fixed;
            /* fundo fixo*/
        }
        h1 {
            color: white;
        }
        hr {
            color: red;
        }
    </style>
</head>
<body>
    <h1>Testando Gradiente</h1>
</body>
</html>
