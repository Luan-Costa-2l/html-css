<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de hover</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-image: linear-gradient(to right, lightgreen, yellowgreen);
            text-align: center;
        }

        main {
            background-color: white;
            border-radius: 20px;
            padding: 20px;
            margin: auto;
            width: 750px;
            height: 400px;
        }

        div > p {
            display: none;
        }

        div:hover > p {
            display: block;
            background-color: red;
            color: white;
            width: 300px;
            margin: auto;
        }
    </style>
</head>
<body>
    <main>
        <h1>Exemplo de hover</h1>
        <p>Passe o mouse sobre o texto abaixo</p>
        <div>
            Passe o mouse aqui
            <p>Texto escondido!</p>
        </div>
        <p>Fim do exemplo.</p>
    </main>
</body>
</html>
